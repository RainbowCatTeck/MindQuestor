# ── MindQuestor — Netlify config ──────────────────────────────────────────────
# Netlify site: mindquestor.netlify.app
# In the Netlify dashboard: Base directory = (blank, repo root), Publish directory = "."
# Repo tooling (package.json, tests/) lives at the same root for reproducibility,
# but is blocked from public access below rather than excluded via base directory.
# ──────────────────────────────────────────────────────────────────────────────

[build]
  publish = "."

# ── Security headers (applied to every response) ──────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# ── HTML files: always re-validate, never serve stale ─────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/app/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirect Netlify subdomain to custom domain ───────────────────────────────
[[redirects]]
  from    = "https://mindquestor.netlify.app/*"
  to      = "https://mindquestor.quest/:splat"
  status  = 301
  force   = true

# ── Block public access to repo tooling (kept in git for reproducibility, never meant to be served) ──
[[redirects]]
  from   = "/package.json"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/package-lock.json"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/tests/*"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/README.md"
  to     = "/index.html"
  status = 404
  force  = true
